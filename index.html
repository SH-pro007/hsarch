<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HS Architects | Under Construction</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#f5f5f5;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:30px;

}

.container{

    background:#fff;

    width:100%;
    max-width:820px;

    border-radius:14px;

    padding:55px 40px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.12);

}

.logo{

    margin-bottom:30px;

}

.logo img{

    width:420px;
    max-width:95%;
    height:auto;

}

h1{

    font-size:52px;
    color:#222;
    margin-bottom:25px;

}

.message{

    color:#555;
    font-size:22px;
    line-height:1.8;

    margin-bottom:45px;

}

.contact{

    margin-bottom:35px;

}

.contact-item{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:12px;

    margin:18px 0;

    font-size:24px;

}

.contact-item i{

    color:#000;

    width:30px;

}

.contact-item a{

    text-decoration:none;

    color:#222;

}

.whatsapp{

display:inline-block;

padding:16px 36px;

background:#25D366;

color:#fff;

text-decoration:none;

border-radius:8px;

font-size:22px;

font-weight:bold;

transition:.3s;

}

.whatsapp:hover{

background:#1db954;

}

.footer{

margin-top:40px;

color:#999;

font-size:18px;

}

@media(max-width:768px){

.container{

padding:35px 20px;

}

.logo img{

width:260px;

}

h1{

font-size:38px;

}

.message{

font-size:18px;

}

.contact-item{

font-size:18px;

}

.whatsapp{

font-size:18px;

padding:14px 24px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<img src="logo.png" alt="HS Architects">

</div>

<h1>Website Under Construction</h1>

<div class="message">

Our website is currently under construction.<br>

We're working on something exciting and will be launching soon.

</div>

<div class="contact">

<div class="contact-item">

<i class="fa-solid fa-phone"></i>

<a href="tel:+919913914198">

+91 99139 14198

</a>

</div>

<div class="contact-item">

<i class="fa-regular fa-envelope"></i>

<a href="mailto:info@hsarch.in">

info@hsarch.in

</a>

</div>

</div>

<a class="whatsapp"

href="https://wa.me/919913914198"

target="_blank">

<i class="fa-brands fa-whatsapp"></i>

&nbsp; Chat on WhatsApp

</a>

<div class="footer">

© HS Architects

</div>

</div>

</body>

</html>
