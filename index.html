<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HS Architects | Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,#f6f6f6,#ececec);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:35px;
color:#222;
}
.card{
width:100%;
max-width:900px;
background:#fff;
border-radius:18px;
padding:50px 45px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
text-align:center;
position:relative;
overflow:hidden;
}
.card:before{
content:"";
position:absolute;
inset:0;
background:
repeating-linear-gradient(90deg,rgba(0,0,0,.025)0 1px,transparent 1px 70px),
repeating-linear-gradient(0deg,rgba(0,0,0,.025)0 1px,transparent 1px 70px);
opacity:.25;
pointer-events:none;
}
.content{position:relative;z-index:2}
.logo img{width:460px;max-width:96%;height:auto;margin-bottom:12px}
.goldline{
width:130px;
height:3px;
background:#b38b59;
margin:18px auto 28px;
border-radius:3px;
}
h1{
font-size:44px;
font-weight:700;
letter-spacing:.5px;
margin-bottom:18px;
}
.desc{
max-width:650px;
margin:auto;
font-size:19px;
line-height:1.9;
color:#666;
}
.contact{
margin:38px 0;
display:flex;
flex-direction:column;
gap:18px;
}
.item{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
font-size:22px;
}
.item i{width:28px;font-size:21px;color:#222}
.item a{text-decoration:none;color:#222}
.whatsapp{
display:inline-flex;
align-items:center;
gap:10px;
padding:16px 34px;
background:#188c4b;
color:#fff;
text-decoration:none;
font-weight:600;
font-size:19px;
border-radius:8px;
transition:.25s;
}
.whatsapp:hover{background:#13713d}
.tag{
margin-top:35px;
font-size:18px;
font-weight:300;
letter-spacing:2px;
color:#888;
}
.footer{
margin-top:18px;
font-size:14px;
color:#aaa;
}
@media(max-width:768px){
body{padding:15px}
.card{padding:35px 22px}
.logo img{width:310px}
h1{font-size:33px}
.desc{font-size:16px}
.item{font-size:18px}
.whatsapp{font-size:17px;padding:14px 22px}
.tag{font-size:15px}
}
</style>
</head>
<body>
<div class="card">
<div class="content">

<div class="logo">
<img src="logo.png" alt="HS Architects">
</div>

<div class="goldline"></div>

<h1>Website Under Construction</h1>

<p class="desc">
Our website is currently under construction.<br>
We're designing inspiring spaces and will be launching our new website soon.
</p>

<div class="contact">
<div class="item">
<i class="fa-solid fa-phone"></i>
<a href="tel:+919913914198">+91 99139 14198</a>
</div>

<div class="item">
<i class="fa-regular fa-envelope"></i>
<a href="mailto:info@hsarch.in">info@hsarch.in</a>
</div>
</div>

<a class="whatsapp" href="https://wa.me/919913914198" target="_blank">
<i class="fa-brands fa-whatsapp"></i>
<span>Chat on WhatsApp</span>
</a>

<div class="tag">Designing Spaces • Inspiring Lives</div>

<div class="footer">© HS Architects</div>

</div>
</div>
</body>
</html>
